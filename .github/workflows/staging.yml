name: Staging — Ephemeral AEE Lifecycle

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Python gateway tests ───────────────────────────────────────────
  python-tests:
    name: Python ${{ matrix.python }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install Python package
        run: pip install -e ".[dev]"

      - name: Run pytest (TEST-001..009)
        run: pytest tests/ -v --tb=short

  # ── Rust firmware tests ────────────────────────────────────────────
  rust-tests:
    name: Rust firmware (TEST-004..006)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            firmware/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('firmware/rust/Cargo.lock') }}

      - name: Run Rust tests
        working-directory: firmware/rust
        run: cargo test --verbose

  # ── specsmith AEE lifecycle (TEST-011..013) ───────────────────────
  specsmith-lifecycle:
    name: specsmith AEE Lifecycle
    runs-on: ubuntu-latest
    needs: [python-tests]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install specsmith from main
        run: pip install "git+https://github.com/layer1labs/specsmith.git@main"

      - name: Validate governance schema — strict (TEST-013)
        env:
          SPECSMITH_NO_AUTO_UPDATE: "1"
          SPECSMITH_PYPI_CHECKED: "1"
        run: |
          python -m specsmith validate --strict --json --project-dir . \
            | tee /tmp/validate.json
          python -c "
          import json, sys
          r = json.load(open('/tmp/validate.json'))
          errors = r.get('strict_errors', 0)
          if errors > 0:
              print(f'FAIL: {errors} strict errors')
              sys.exit(1)
          print('PASS: 0 strict errors')
          "

      - name: Sync machine state (TEST-012)
        env:
          SPECSMITH_NO_AUTO_UPDATE: "1"
          SPECSMITH_PYPI_CHECKED: "1"
        run: python -m specsmith sync --project-dir .

      - name: Sync check — assert drift-free (TEST-012)
        env:
          SPECSMITH_NO_AUTO_UPDATE: "1"
          SPECSMITH_PYPI_CHECKED: "1"
        run: python -m specsmith sync --check --project-dir .

      - name: Audit governance health (TEST-011)
        env:
          SPECSMITH_NO_AUTO_UPDATE: "1"
          SPECSMITH_PYPI_CHECKED: "1"
        run: python -m specsmith audit --project-dir .

      - name: Preflight smoke-test
        env:
          SPECSMITH_NO_AUTO_UPDATE: "1"
          SPECSMITH_PYPI_CHECKED: "1"
        run: |
          python -m specsmith preflight "add CAN filter for extended frames" \
            --project-dir . --json | python -c "
          import json, sys
          d = json.load(sys.stdin)
          print('decision:', d['decision'])
          if d['decision'] not in ('accepted', 'needs_clarification'):
              sys.exit(1)
          "

      - name: Dispatch CLI smoke-test
        env:
          SPECSMITH_NO_AUTO_UPDATE: "1"
          SPECSMITH_PYPI_CHECKED: "1"
        run: |
          python -m specsmith dispatch run "improve CAN parse robustness" \
            --no-dag --project-dir .
