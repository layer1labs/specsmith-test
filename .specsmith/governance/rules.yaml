rules:
- id: H1
  name: Ledger required
  description: No ledger entry = work not done.
- id: H2
  name: Proposal required
  description: No proposal = no execution.
- id: H3
  name: Cross-platform awareness
  description: All work must consider every target platform (Linux, Windows, macOS).
    If a platform is unsupported or deferred, that must be stated explicitly.
- id: H4
  name: Environment isolation
  description: No system-dependent assumptions. Virtual environments required. No
    reliance on global interpreters or system packages.
- id: H5
  name: Explicit startup
  description: No hidden service logic. All startup behavior must be documented and
    inspectable.
- id: H6
  name: No silent scope expansion
  description: If the task grows beyond the proposal, stop and re-propose.
- id: H7
  name: No undocumented state changes
  description: Every file creation, modification, or deletion must be traceable to
    a proposal and recorded in the ledger.
- id: H8
  name: Documentation is implementation
  description: Architecture-affecting changes MUST update relevant docs in the same
    work cycle.
- id: H9
  name: Execution timeout required
  description: All agent-invoked commands MUST have a timeout. No command may run
    indefinitely. If a command hangs, it must be killed, recorded in the ledger, and
    escalated after one retry.
- id: H10
  name: No hardcoded versions
  description: Version strings MUST NOT be hardcoded in documentation, tests, or source
    code outside of `pyproject.toml`. Use `importlib.metadata.version()` at runtime.
    Use `{{ version }}` placeholders in documentation resolved at build time.
- id: H11
  name: No unbounded loops or blocking I/O without a deadline
  description: 'Every loop or blocking wait in agent-written scripts and automation
    MUST have:


    - An explicit deadline or iteration cap (e.g. a `deadline` timestamp, a `max_attempts`
    counter, or a `timeout` parameter).

    - A fallback exit path that executes when the deadline is reached.

    - A diagnostic message emitted if the timeout fires (self-diagnosing failures).


    Examples of violating patterns: `while True:` / `while ($true)` / `for (;;)` with
    no deadline guard; serial-port or I/O polling loops with no deadlin'
- id: H12
  name: Windows multi-step automation via .cmd files
  description: On Windows, multi-step or heavily-quoted automation sequences MUST
    be written to a temporary `.cmd` file and executed from there. Do NOT emit these
    as inline shell invocations or as `.ps1` files unless there is a concrete PowerShell-only
    requirement. Inline multi-line quoting on Windows is fragile and causes avoidable
    hangs.
- id: H13
  name: Epistemic Boundaries Required
  description: 'All proposals MUST state their epistemic boundaries. A proposal without
    explicit assumptions is a stop condition, not a warning. Before executing, ask:

    - What BeliefArtifact IDs does this proposal rely on?

    - What are the hidden assumptions?

    - What adversarial challenge could break this proposal?

    - Are any P1 requirements in scope and at LOW confidence?


    Hidden assumptions are not acceptable. Declare all epistemic boundaries in the
    `Assumptions:` field of every proposal.


    ---


    ## Stop Conditions

    '
