content: "# Project Lifecycle — AEE Development Phases\n\nThis project follows the\
  \ 7-phase Applied Epistemic Engineering (AEE) development lifecycle. Each phase\
  \ has readiness checks that must pass before advancing.\n\n**Current phase:** \U0001F331\
  \ **Inception** (`inception`)\n\n## Phases\n\n1. \U0001F331 **Inception** — Governance\
  \ scaffold, AGENTS.md, project type established\n2. \U0001F3D7 **Architecture**\
  \ — ARCHITECTURE.md written, components defined, key decisions sealed\n3. \U0001F4CB\
  \ **Requirements** — REQUIREMENTS.md populated, stress-tested, equilibrium reached\n\
  4. ✅ **Test Specification** — TESTS.md covers all P1 requirements, coverage ≥ 80%\n\
  5. ⚙ **Implementation** — Code development loop; audit passes; ledger updated each\
  \ session\n6. \U0001F52C **Verification** — Epistemic audit passes threshold; trace\
  \ vault sealed; export clean\n7. \U0001F680 **Release** — CHANGELOG updated; release\
  \ tag created; compliance report filed\n\n## Phase Flow\n\n```\ninception → architecture\
  \ → requirements → test_spec → implementation → verification → release\n       \
  \                                                                              \
  \   ↓\n                                                                        \
  \          (next cycle)\n```\n\n## Advancing Phases\n\nCheck readiness: `specsmith\
  \ phase show`\nAdvance to next: `specsmith phase next`\nForce-set phase: `specsmith\
  \ phase set <phase> --force`\n\nAll checks for the current phase must pass before\
  \ `phase next` will advance.\nUse `--force` to override (e.g. during rapid prototyping).\n\
  \n## Phase Artifacts\n\nEach phase produces specific artifacts:\n\n- **Inception**:\
  \ `scaffold.yml`, `AGENTS.md`, `LEDGER.md`\n- **Architecture**: `docs/ARCHITECTURE.md`,\
  \ trace vault seal\n- **Requirements**: `docs/REQUIREMENTS.md`, `docs/TESTS.md`\n\
  - **Test Specification**: TESTS.md with ≥ 80% REQ coverage\n- **Implementation**:\
  \ Code, updated LEDGER.md, passing audit\n- **Verification**: Epistemic audit, trace\
  \ vault seals, export report\n- **Release**: `CHANGELOG.md`, release tag, compliance\
  \ report\n"
